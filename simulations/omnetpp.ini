[General]
network = bfsroutingproject_new.BFSRoutingNetwork
sim-time-limit = 10s

# Enable logging
**.node[*].cmdenv-log-level = info

# Display settings for Qtenv
qtenv-default-config = 
qtenv-default-run = 1

# Animation speed
**.node[*].typename = "BFSRouter"

# Network visualization
**.node[*].displayString = "i=block/routing"